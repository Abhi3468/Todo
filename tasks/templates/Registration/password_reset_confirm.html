<!DOCTYPE html>
<html>

<head>
    <title>Set New Password</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #ffffff;
            font-weight: 600;
        }

        p {
            margin-bottom: 25px;
            color: #cccccc;
            font-size: 14px;
            line-height: 1.5;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }

        label {
            font-weight: 500;
            color: #cccccc;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            background-color: #2c2c2c;
            color: #ffffff;
            transition: border-color 0.3s;
            width: 100%;
        }

        input:focus {
            outline: none;
            border-color: #8e44ad;
            box-shadow: 0 0 0 2px rgba(142, 68, 173, 0.2);
        }

        button {
            padding: 12px;
            background-color: #8e44ad;
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
            width: 100%;
        }

        button:hover {
            background-color: #9b59b6;
        }

        .errorlist {
            color: #e74c3c;
            font-size: 12px;
            margin: 0;
            padding: 0;
            list-style: none;
        }

        .helptext {
            font-size: 12px;
            color: #888888;
            margin-top: 5px;
            line-height: 1.4;
            display: block;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Enter New Password</h2>

        {% if validlink %}
        <p>Please enter your new password twice so we can verify you typed it in correctly.</p>
        <form method="post" autocomplete="off">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Change Password</button>
        </form>
        {% else %}
        <p>The password reset link was invalid, possibly because it has already been used. Please request a new password
            reset.</p>
        {% endif %}
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var inputs = document.querySelectorAll('form input[type="text"], form input[type="email"], form input[type="password"]');
            inputs.forEach(function (input) {
                input.setAttribute('readonly', 'readonly');
                input.value = '';
                input.addEventListener('focus', function () {
                    input.removeAttribute('readonly');
                });
            });
        });
    </script>

</body>

</html>
