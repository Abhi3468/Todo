<!DOCTYPE html>
<html>

<head>
    <title>Email Sent</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
            padding: 40px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            color: #ffffff;
            font-weight: 600;
        }

        p {
            margin-bottom: 25px;
            color: #cccccc;
            font-size: 15px;
            line-height: 1.6;
        }

        a {
            color: #8e44ad;
            text-decoration: none;
            transition: color 0.3s;
            font-weight: 500;
        }

        a:hover {
            color: #9b59b6;
        }

        .back-link {
            margin-top: 20px;
            display: block;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Check Your Email</h2>
        <p>We've emailed you instructions for setting your password, if an account exists with the email you entered.
            You should receive them shortly.</p>
        <p>If you don't receive an email, please make sure you've entered the address you registered with, and check
            your spam folder.</p>
        <a href="{% url 'login' %}" class="back-link">Back to Login</a>
    </div>

</body>

</html>
