{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <link rel="stylesheet" href="{% static 'tasks/css/style.css' %}">
</head>

<body>

    <div class="app-container">
        <header class="app-header">
            <div class="user-info">
                <div class="user-avatar">
                    {{ request.user.username|make_list|first }}
                </div>
                <div class="user-greeting">
                    Welcome, <span>{{ request.user.username }}</span>
                </div>
            </div>

            <form action="{% url 'logout' %}" method="post">
                {% csrf_token %}
                <button type="submit" class="logout-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Logout
                </button>
            </form>
        </header>

        <main class="todo-main">
            <div class="title-container">
                <h1 class="app-title">My To-Do List</h1>
                <a href="{% url 'api_download_pdf' %}" class="download-pdf-btn" target="_blank">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    Download PDF
                </a>
            </div>

            <form id="addTaskForm" class="add-task-form">
                {% csrf_token %}
                <input type="text" id="taskTitle" name="title" class="add-task-input"
                    placeholder="What needs to be done?" required autocomplete="off">
                <button type="submit" class="add-task-btn">Add</button>
            </form>

            <ul class="task-list" id="taskList">
                <!-- Tasks will be rendered here by Javascript -->
            </ul>
            <script src="{% static 'tasks/js/app.js' %}"></script>
</body>

</html>
