<!DOCTYPE html>
<html>

<head>
    <title>Create Account</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: #1e1e1e;
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.5);
            padding: 40px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            margin: 20px 0;
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px;
            }

            h2 {
                font-size: 1.5rem;
            }
        }

        h2 {
            margin-top: 0;
            margin-bottom: 30px;
            color: #ffffff;
            font-weight: 600;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: 500;
            color: #cccccc;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            background-color: #2c2c2c;
            color: #ffffff;
            transition: border-color 0.3s;
            width: 100%;
        }

        input:focus {
            outline: none;
            border-color: #8e44ad;
            box-shadow: 0 0 0 2px rgba(142, 68, 173, 0.2);
            /* Soft purple glow on focus */
        }

        button[type="submit"] {
            padding: 12px;
            background-color: #8e44ad;
            border: none;
            border-radius: 6px;
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button[type="submit"]:hover {
            background-color: #9b59b6;
        }

        p {
            margin: 15px 0 0;
            color: #cccccc;
            font-size: 14px;
            text-align: center;
        }

        a {
            color: #8e44ad;
            text-decoration: none;
            transition: color 0.3s;
        }

        a:hover {
            color: #9b59b6;
        }

        .required {
            color: #e74c3c;
        }

        .error {
            color: #e74c3c;
            font-size: 12px;
        }

        .hint {
            font-size: 12px;
            color: #888888;
            line-height: 1.4;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Create New Account</h2>

        <form method="post" autocomplete="off">
            {% csrf_token %}

            <div class="form-group">
                <label>Username <span class="required">*</span></label>
                <input type="text" name="username" required>
                <div class="error">{{ form.username.errors }}</div>
            </div>

            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <input type="email" name="email" placeholder="Enter your email" required>
                <div class="error">{{ form.email.errors }}</div>
            </div>

            <div class="form-group">
                <label>Password <span class="required">*</span></label>
                <input type="password" name="password1" required>
                <div class="hint">
                    Password must be at least 8 characters, not common, and not numeric only.
                </div>
                <div class="error">{{ form.password1.errors }}</div>
            </div>

            <div class="form-group">
                <label>Confirm Password <span class="required">*</span></label>
                <input type="password" name="password2" required>
                <div class="error">{{ form.password2.errors }}</div>
            </div>

            <button type="submit">Create Account</button>
        </form>

        <p>
            Already have an account?
            <a href="{% url 'login' %}">Login</a>
        </p>
    </div>

    <script>
        // The ultimate workaround for Chrome's aggressive autofill
        // This ensures fields are totally empty when you open the site
        document.addEventListener("DOMContentLoaded", function () {
            var inputs = document.querySelectorAll('form input[type="text"], form input[type="email"], form input[type="password"]');
            inputs.forEach(function (input) {
                // Set fields to readonly on page load so Chrome ignores them
                input.setAttribute('readonly', 'readonly');
                input.value = ''; // Force empty

                // Remove readonly when the user clicks/focuses to type
                input.addEventListener('focus', function () {
                    input.removeAttribute('readonly');
                });
            });
        });
    </script>

</body>

</html>
